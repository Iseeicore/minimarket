name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Lint + Type Check ───────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install --legacy-peer-deps
      - run: npx prisma generate
      - run: npx tsc --noEmit

  # ── 2. Unit Tests ──────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install --legacy-peer-deps
      - run: npx prisma generate
      - run: npx jest --no-cache --forceExit --passWithNoTests

  # ── 3. E2E Tests (con PostgreSQL real) ─────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: minimarket_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/minimarket_test
      JWT_SECRET: e2e-test-secret-key-not-for-production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install --legacy-peer-deps
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npx jest --config test/jest-e2e.json --no-cache --forceExit

  # ── 4. Docker Build (verifica que la imagen se construye) ──────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
